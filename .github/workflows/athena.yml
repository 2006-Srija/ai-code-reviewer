name: Athena

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  athena:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run Athena
        id: review
        run: |
          python agents/athena.py --pr ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
      
      - name: Post Comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = ${{ steps.review.outputs.result }};
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🦉 Athena\n**Score:** ${review.score}/100\n**Issues:** ${review.total_issues}\n\n${review.findings.map(f => `- **${f.agent}** : ${f.title} (${f.severity})`).join('\n')}`
            });
      
      - name: Auto-Fix PR
        if: steps.review.outputs.has_fixes == 'true'
        run: |
          python agents/refactor.py --create-fix-pr